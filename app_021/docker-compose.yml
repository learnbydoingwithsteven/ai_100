version: '3.8'

services:
  backend:
    build: ./backend
    ports:
      - "8021:8000"
    environment:
      - DEBUG=True
    volumes:
      - ./backend:/app

  frontend:
    build: ./frontend
    ports:
      - "3021:3000"
    environment:
      - REACT_APP_API_URL=http://localhost:8021
    volumes:
      - ./frontend:/app
      - /app/node_modules

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: app021
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
    ports:
      - "5453:5432"

  redis:
    image: redis:7-alpine
    ports:
      - "6400:6379"
